<script type="text/javascript">
            // FORMULARZ DISPATCH
            $('#form-dispatch').validate({
                errorElement: 'span',
                rules: {
                    email: {
                        email: true
                    }
                },
                messages: {
                    email: {
                        required: 'required',
                        email: 'required'
                    },
                    phone: 'required',
                },
                submitHandler: function(form) {
                    $('#form-dispatch .msg').html('sending...');
                    jQuery.ajax({
                        type: 'POST',
                        dataType: 'json',
                        data: $('#form-dispatch').serialize() + "&tagType=slide",
                        success: function(data, textStatus) {
                            if (data.wynik) {
                                $('#form-dispatch input[type="text"]').val('');
                                $('#form-dispatch input[type="checkbox"]').attr('checked', false);
                                $('#form-dispatch .msg').html(data.msg);
                            } else {
                                $('#form-dispatch .msg').html(data.msg);
                            }
                        },
                        error: function() {
                            $('#form-dispatch .msg').html('Error ajax()');
                        },
                        url: '/en/ajx-contact'
                    });
                }
            });
            // EOF FORMULARZ DISPATCH

            // FORM DELIVERY

                            } else {
                                $('#form-delivery .msg').html(data.msg);
                            }
                        },
                        error: function() {
                            $('#form-delivery .msg').html('Error ajax()');
                        },
                        url: 'ajx-contact'
                    });
                }
            });
            // EOF FORM DELIVERY

        });

                    error.appendTo(element.prev('label'));
