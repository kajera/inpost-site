<body class="">

    <div id="wrap" class="underHandF">

            <div id="contentwrapper">

                    <div class="row" id="content">

                        <div class="span12" id="narrow-content">

                            <div class="row znajdz-paczke">

                                        <div class="form-group">
                                            <label class="control-label required" for="find_parcel_parcel_number">Número do Pacote</label>

    <script>

    translate_status = function(status){
        translation = '';
        switch(status){
            case 'CREATED':
            translation='Manifestado';
            break;
            case 'SENT':
            translation='Coletado pela transportadora';                    
            break;
            case 'INTRANSIT':
            translation='Em transito';                    
            break;                    
            case 'STORED':
            translation='Depositada';
            break;                    
            case 'AVIZO':
            translation='Lembrete de retirada enviado';                    
            break;                                        
            case 'Prazo expirado':
            translation='';                    
            break;                    
            case 'DELIVERED':
            translation='Entregue';                    
            break;                    
            case 'MISSING':
            translation='Não encontrada';                    
            break;                    
            case 'CLAIMED':
            translation='Bloqueada';
            break;                    
            case 'RETURNEDTOAGENCY':
            translation='Recolhida pelo entregador';                    
            break;                    
            case 'DELIVEREDTOAGENCY':
            translation='Retornou para a transportadora';                    
            break;                    
            case 'RETURNEDTOSENDER':
            translation='Devolvida ao remetente';
            break;                    
            case 'OVERSIZED':
            translation='Encomenda grande demais';
            break;                    
            case 'CANCELLED':
            translation='Cancelada';                    
            break;                    
            case 'CUSTOMERSTORED':
            translation='Encomenda Depositada';
            break;
            default:
            translation=status;
            break;

        }
        return translation;            
    };
    var link = 'https://api.inpostbra.com.br/public/v1/parcels/';
    fetch_status = function(){

        console.log('fetch_status');
        $( "#results" ).empty();
        if ($("#form-find-parcel").valid()) {

            parcels = $('#find_parcel_parcel_number').val();
            url = link + parcels;
            $.get(url, function(data){
                console.log(data.parcelCode);
                $.each(data.parcelHistory, function(key, value){
                    status = "<div class='span12'><div class='span3'>"+  moment(value.statusUpdatedAt).format('DD/MM/YYYY hh:mm') +"</div> <div class='span4 text-left'>"+ translate_status(value.status) +'</div></div>'
                    $( "#results" ).append( status );
                });


            })  
        }            
    }
    $(document).ready(function() {
        parcelCode = $.QueryString["parcelCode"];
        if(parcelCode){
            $('#find_parcel_parcel_number').val(parcelCode);
            fetch_status();
        }
        console.log();

        $.validator.addMethod("regex", function(value, element) {
            var re = new RegExp('^[0-9a-zA-Z]*$');
            return this.optional(element) || re.test(value);
        },
        "Apenas caracteres alphanuméricos são permitidos."
        );
        $('#form-find-parcel').validate({
            errorElement: 'span',
            rules: {
                "find_parcel[parcel_number]": {
                    required: true,
                    regex: true
                }
            },
            messages: {
                "find_parcel[parcel_number]": {
                    required: "Informe o código da sua encomenda"
                }
            }
        });

            //
            
            $("#find_parcel_submit").click(function(e) {                
                e.preventDefault();
                fetch_status();
            })

        });
(function($) {
    $.QueryString = (function(a) {
        if (a == "") return {};
        var b = {};
        for (var i = 0; i < a.length; ++i)
        {
            var p=a[i].split('=', 2);
            if (p.length != 2) continue;
            b[p[0]] = decodeURIComponent(p[1].replace(/\+/g, " "));
        }
        return b;
    })(window.location.search.substr(1).split('&'))
})(jQuery);
</script>
